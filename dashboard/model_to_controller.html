<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JSON → GetX Controller | Nithin Francis Tools</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "apple-gray": "#F5F5F7",
        "apple-black": "#1D1D1F",
        "apple-blue": "#0066CC",
      },
      fontFamily: {
        "sans": ["Inter", "sans-serif"],
        "mono": ["JetBrains Mono", "monospace"],
      },
    },
  },
};
</script>

<style>
body {
  background:#F5F5F7;
  font-family:Inter, sans-serif;
}
.bento-card {
  background:white;
  border-radius:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.05);
}
.code-scroll::-webkit-scrollbar { width:6px; }
.code-scroll::-webkit-scrollbar-thumb {
  background:rgba(0,0,0,0.1);
  border-radius:4px;
}
</style>
</head>

<body class="p-8">

<div class="max-w-6xl mx-auto space-y-8">

<div class="text-center space-y-2">
  <h1 class="text-4xl font-bold">JSON → GetX Controller</h1>
  <p class="text-gray-500">Auto Generate Rxn | List Getters | Load Method | Clean Architecture</p>
</div>

<div class="bento-card p-6 space-y-4">
  <div>
    <label class="text-xs font-bold uppercase text-gray-400">Main Model Class Name</label>
    <input id="className" type="text" value="UserResponseModel"
           class="w-full mt-1 p-3 rounded-lg bg-gray-100 font-mono"/>
  </div>

  <button id="convertBtn"
          class="bg-black text-white px-6 py-3 rounded-full font-semibold hover:opacity-90 transition">
    Generate Controller
  </button>
</div>

<div class="grid md:grid-cols-2 gap-8">

  <div class="bento-card p-4">
    <h3 class="font-semibold mb-2">Raw JSON</h3>
    <textarea id="jsonInput"
      class="w-full h-[400px] font-mono text-sm bg-gray-100 p-4 rounded-lg resize-none">
{
  "id": 1,
  "name": "Nithin Francis",
  "projects": [
    {
      "title": "Flutter POS",
      "experience": 6
    }
  ]
}
    </textarea>
  </div>

  <div class="bento-card p-4">
    <div class="flex justify-between items-center mb-2">
      <h3 class="font-semibold">Generated GetX Controller</h3>
      <button id="copyBtn" class="text-sm text-blue-600 font-semibold">
        Copy
      </button>
    </div>
    <pre id="outputCode"
      class="h-[400px] overflow-auto font-mono text-sm bg-gray-50 p-4 rounded-lg code-scroll"></pre>
  </div>

</div>
</div>

<script>
document.getElementById("convertBtn").addEventListener("click", generateController);
document.getElementById("copyBtn").addEventListener("click", copyCode);

function generateController() {
  const jsonText = document.getElementById("jsonInput").value.trim();
  const className = document.getElementById("className").value.trim();

  if (!jsonText || !className) {
    alert("Please provide JSON and Model Name");
    return;
  }

  let json;
  try {
    json = JSON.parse(jsonText);
  } catch (e) {
    alert("Invalid JSON");
    return;
  }

  const controllerName = removeModel(className) + "Controller";
  const variableName = camel(className);

  const listGetters = generateListGetters(json, variableName);

  const output = `import 'package:get/get.dart';

class ${controllerName} extends GetxController {

  /// Private State
  final Rxn<${className}> _${variableName} = Rxn<${className}>();
  final RxBool _isLoading = false.obs;

  /// Public Getters
  bool get isLoading => _isLoading.value;

  ${className}? get ${variableName} =>
      _${variableName}.value;
${listGetters}

  /// Load Data
  Future<void> load${removeModel(className)}Data(
      Map<String, dynamic> json) async {
    try {
      _isLoading.value = true;

      final model = ${className}.fromJson(json);
      _${variableName}.value = model;

    } catch (e) {
      Get.snackbar(
        "Error",
        e.toString(),
        snackPosition: SnackPosition.BOTTOM,
      );
    } finally {
      _isLoading.value = false;
    }
  }

  /// Clear Data
  void clearData() {
    _${variableName}.value = null;
  }
}
`;

  document.getElementById("outputCode").textContent = output;
}

function generateListGetters(json, variableName) {
  let result = "";

  for (let key in json) {
    if (Array.isArray(json[key]) &&
        json[key].length > 0 &&
        typeof json[key][0] === "object") {

      const typeName = capitalize(singular(key));

      result += `
  List<${typeName}> get ${key} =>
      _${variableName}.value?.${key} ?? [];
`;
    }
  }

  return result;
}

function singular(word) {
  if (word.endsWith("ies"))
    return word.slice(0, -3) + "y";
  if (word.endsWith("s"))
    return word.slice(0, -1);
  return word;
}

function camel(str) {
  return str.charAt(0).toLowerCase() + str.slice(1);
}

function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function removeModel(name) {
  return name.replace(/Model$/i, '');
}

function copyCode() {
  const code = document.getElementById("outputCode").textContent;
  navigator.clipboard.writeText(code);
  alert("Copied to clipboard!");
}
</script>

</body>
</html>
