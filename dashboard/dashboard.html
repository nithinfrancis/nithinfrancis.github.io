<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JSON to Dart Pro Generator</title>
  <style>
    body {
      font-family: Inter, sans-serif;
      background: #0f172a;
      color: white;
      padding: 30px;
    }
    textarea {
      width: 100%;
      height: 200px;
      background: #1e293b;
      color: #fff;
      border: none;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    button {
      padding: 12px 20px;
      background: #6366f1;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-right: 10px;
    }
    pre {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      overflow-x: auto;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🔥 JSON → Dart Pro Generator</h1>

<textarea id="jsonInput" placeholder="Paste your JSON here..."></textarea>
<br/>
<button onclick="generate()">Generate</button>
<button onclick="copyCode()">Copy</button>

<pre id="output"></pre>

<script>

function generate() {
  const input = document.getElementById("jsonInput").value;
  const output = document.getElementById("output");

  try {
    const json = JSON.parse(input);
    const classes = {};
    generateClass("AutoGenerated", json, classes);
    output.textContent = Object.values(classes).reverse().join("\n\n");
  } catch (e) {
    output.textContent = "Invalid JSON ❌";
  }
}

function generateClass(className, obj, classes) {
  if (classes[className]) return;

  let fields = "";
  let constructorParams = "";
  let fromJson = "";
  let toJson = "";
  let copyWithParams = "";
  let copyWithBody = "";

  for (let key in obj) {
    const value = obj[key];
    const type = resolveType(capitalize(key), value, classes);

    fields += `  final ${type}? ${key};\n`;
    constructorParams += `    this.${key},\n`;

    if (isCustomClass(type)) {
      if (isList(value)) {
        fromJson += `
      ${key}: (json['${key}'] as List<dynamic>?)
          ?.map((e) => ${extractListType(type)}.fromJson(e))
          .toList(),`;
        toJson += `
      '${key}': ${key}?.map((e) => e.toJson()).toList(),`;
      } else {
        fromJson += `
      ${key}: json['${key}'] != null
          ? ${type}.fromJson(json['${key}'])
          : null,`;
        toJson += `
      '${key}': ${key}?.toJson(),`;
      }
    } else {
      fromJson += `
      ${key}: json['${key}'],`;
      toJson += `
      '${key}': ${key},`;
    }

    copyWithParams += `${type}? ${key}, `;
    copyWithBody += `
      ${key}: ${key} ?? this.${key},`;
  }

  const dartClass = `
class ${className} {
${fields}

  ${className}({
${constructorParams}  });

  factory ${className}.fromJson(Map<String, dynamic> json) {
    return ${className}(
${fromJson}
    );
  }

  Map<String, dynamic> toJson() {
    return {
${toJson}
    };
  }

  ${className} copyWith({${copyWithParams}}) {
    return ${className}(
${copyWithBody}
    );
  }
}
`;

  classes[className] = dartClass;
}

function resolveType(className, value, classes) {
  if (typeof value === "string") return "String";
  if (typeof value === "number") return Number.isInteger(value) ? "int" : "double";
  if (typeof value === "boolean") return "bool";

  if (Array.isArray(value)) {
    if (value.length === 0) return "List<dynamic>";
    const itemType = resolveType(className, value[0], classes);
    return `List<${itemType}>`;
  }

  if (typeof value === "object" && value !== null) {
    generateClass(className, value, classes);
    return className;
  }

  return "dynamic";
}

function isList(value) {
  return Array.isArray(value);
}

function isCustomClass(type) {
  return !["String","int","double","bool","dynamic"].includes(type) && !type.startsWith("List<String>") && !type.startsWith("List<int>") && !type.startsWith("List<double>") && !type.startsWith("List<bool>");
}

function extractListType(type) {
  return type.replace("List<","").replace(">","");
}

function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function copyCode() {
  const code = document.getElementById("output").textContent;
  navigator.clipboard.writeText(code);
  alert("Copied ✅");
}

</script>

</body>
</html>
