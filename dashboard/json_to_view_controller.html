<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JSON → GetX Module Generator | Nithin Francis Tools</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "apple-gray": "#F5F5F7",
        "apple-black": "#1D1D1F",
        "apple-blue": "#0066CC",
      },
      fontFamily: {
        "sans": ["Inter", "sans-serif"],
        "mono": ["JetBrains Mono", "monospace"],
      },
    },
  },
};
</script>

<style>
body { background:#F5F5F7; font-family:Inter, sans-serif; }
.bento-card {
  background:white;
  border-radius:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.05);
}
.code-scroll::-webkit-scrollbar { width:6px; }
.code-scroll::-webkit-scrollbar-thumb {
  background:rgba(0,0,0,0.1);
  border-radius:4px;
}
</style>
</head>

<body class="p-8">

<div class="max-w-7xl mx-auto space-y-8">

<div class="text-center space-y-2">
  <h1 class="text-4xl font-bold">JSON → GetX Controller + View</h1>
  <p class="text-gray-500">Auto Controller | Auto List Screen | Production Ready</p>
</div>

<div class="bento-card p-6 space-y-4">
  <label class="text-xs font-bold uppercase text-gray-400">
    Main Model Class Name
  </label>
  <input id="className" type="text" value="UserResponseModel"
         class="w-full mt-1 p-3 rounded-lg bg-gray-100 font-mono"/>

  <button id="generateBtn"
          class="bg-black text-white px-6 py-3 rounded-full font-semibold hover:opacity-90 transition">
    Generate Module
  </button>
</div>

<div class="grid md:grid-cols-2 gap-8">

<div class="bento-card p-4">
<h3 class="font-semibold mb-2">Raw JSON</h3>
<textarea id="jsonInput"
class="w-full h-[500px] font-mono text-sm bg-gray-100 p-4 rounded-lg resize-none">
{
  "id": 1,
  "name": "Nithin Francis",
  "projects": [
    {
      "name": "Flutter POS",
      "status": "Active",
      "team": [
        {"name": "Dev1"},
        {"name": "Dev2"}
      ]
    }
  ]
}
</textarea>
</div>

<div class="bento-card p-4">
<div class="flex justify-between items-center mb-2">
<h3 class="font-semibold">Generated Code</h3>
<button id="copyBtn" class="text-sm text-blue-600 font-semibold">Copy</button>
</div>
<pre id="outputCode"
class="h-[500px] overflow-auto font-mono text-sm bg-gray-50 p-4 rounded-lg code-scroll"></pre>
</div>

</div>
</div>

<script>
document.getElementById("generateBtn").addEventListener("click", generateModule);
document.getElementById("copyBtn").addEventListener("click", copyCode);

function generateModule() {

  const jsonText = document.getElementById("jsonInput").value.trim();
  const modelName = document.getElementById("className").value.trim();

  if (!jsonText || !modelName) {
    alert("Provide JSON and Model Name");
    return;
  }

  let json;
  try { json = JSON.parse(jsonText); }
  catch { alert("Invalid JSON"); return; }

  const controllerName = removeModel(modelName) + "Controller";
  const variableName = camel(modelName);

  const listInfo = detectFirstList(json);

  const controllerCode = generateController(
    modelName,
    controllerName,
    variableName,
    listInfo
  );

  const viewCode = listInfo
    ? generateView(controllerName, listInfo)
    : "// No list detected in JSON. View not generated.";

  document.getElementById("outputCode").textContent =
      controllerCode + "\n\n\n" + viewCode;
}

function detectFirstList(json) {
  for (let key in json) {
    if (Array.isArray(json[key]) &&
        json[key].length > 0 &&
        typeof json[key][0] === "object") {

      return {
        key: key,
        type: capitalize(singular(key)),
        itemSample: json[key][0]
      };
    }
  }
  return null;
}

function generateController(modelName, controllerName, variableName, listInfo) {

return `import 'package:get/get.dart';

class ${controllerName} extends GetxController {

  final Rxn<${modelName}> _${variableName} = Rxn<${modelName}>();
  final RxBool isLoading = false.obs;

  ${modelName}? get ${variableName} =>
      _${variableName}.value;

  ${listInfo ? `
  List<${listInfo.type}> get ${listInfo.key} =>
      _${variableName}.value?.${listInfo.key} ?? [];
  ` : ""}

  Future<void> load${removeModel(modelName)}Data(
      Map<String, dynamic> json) async {

    try {
      isLoading.value = true;

      final model = ${modelName}.fromJson(json);
      _${variableName}.value = model;

    } catch (e) {
      Get.snackbar(
        "Error",
        e.toString(),
        snackPosition: SnackPosition.BOTTOM,
      );
    } finally {
      isLoading.value = false;
    }
  }

  void clearData() {
    _${variableName}.value = null;
  }
}`;
}

function generateView(controllerName, listInfo) {

return `

import 'package:flutter/material.dart';
import 'package:get/get.dart';

class ${listInfo.type}ListScreen extends StatelessWidget {
  ${listInfo.type}ListScreen({super.key});

  final ${controllerName} controller =
      Get.put(${controllerName}());

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(
        title: const Text("${capitalize(listInfo.key)}"),
      ),
      body: Obx(() {
        if (controller.isLoading.value) {
          return const Center(
            child: CircularProgressIndicator(),
          );
        }

        final items = controller.${listInfo.key};

        if (items.isEmpty) {
          return const Center(
            child: Text("No ${capitalize(listInfo.key)} Available"),
          );
        }

        return ListView.builder(
          padding: const EdgeInsets.all(16),
          itemCount: items.length,
          itemBuilder: (context, index) {

            final item = items[index];

            return Card(
              margin: const EdgeInsets.only(bottom: 12),
              child: ListTile(
                title: Text(
                  item.name ?? '',
                  style: const TextStyle(
                    fontWeight: FontWeight.bold,
                  ),
                ),
                subtitle: Text(
                  item.status?.toString() ?? '',
                ),
              ),
            );
          },
        );
      }),
    );
  }
}`;
}

function singular(word) {
  if (word.endsWith("ies")) return word.slice(0,-3)+"y";
  if (word.endsWith("s")) return word.slice(0,-1);
  return word;
}

function camel(str) {
  return str.charAt(0).toLowerCase() + str.slice(1);
}

function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function removeModel(name) {
  return name.replace(/Model$/i,'');
}

function copyCode() {
  const code = document.getElementById("outputCode").textContent;
  navigator.clipboard.writeText(code);
  alert("Copied!");
}
</script>

</body>
</html>
